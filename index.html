<!doctype html>
<html lang="zh-CN">
<head>
  <!-- head 区域：放网页标题、编码、移动端适配、SEO 描述和 CSS 样式 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="一个低成本运行的静态技术博客网站，支持 Markdown 写作、搜索、标签、导入导出。" />
  <title>DCloudCode 技术博客</title>
  <style>
    /* 样式区：控制网站的颜色、布局、卡片、文章正文、编辑器和移动端适配 */
    /* 全局主题变量：集中管理浅色模式下的颜色、圆角、阴影 */
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-2: #f0f3f8;
      --text: #111827;
      --muted: #667085;
      --border: #d9e0ea;
      --brand: #2563eb;
      --brand-2: #1d4ed8;
      --code-bg: #0f172a;
      --code-text: #e5e7eb;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    /* 深色主题变量：点击“主题”按钮后会切换到这里的配色 */
    [data-theme="dark"] {
      --bg: #0b1020;
      --panel: #111827;
      --panel-2: #172033;
      --text: #eef2ff;
      --muted: #a7b0c3;
      --border: #273449;
      --brand: #60a5fa;
      --brand-2: #93c5fd;
      --code-bg: #020617;
      --code-text: #f8fafc;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    /* 页面主体：设置全站字体、背景渐变、文字颜色和最小高度 */
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* 页面容器：限制内容最大宽度，并让内容居中 */
    .container {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* 顶部导航栏：固定在页面顶部，带半透明模糊效果 */
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 1.15rem;
    }

    /* 左上角 D Logo：控制图标大小、渐变背景和圆角 */
    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), #22d3ee);
      display: grid;
      place-items: center;
      color: white;
      box-shadow: var(--shadow);
      font-weight: 900;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button, .button, input, textarea, select {
      font: inherit;
    }

    button, .button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      background: var(--panel-2);
      color: var(--text);
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    button:hover, .button:hover { transform: translateY(-1px); }
    button:active, .button:active { transform: translateY(0); }

    .primary {
      background: var(--brand);
      color: white;
      font-weight: 700;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    [data-theme="dark"] .danger {
      background: rgba(248, 113, 113, 0.14);
      color: #fca5a5;
    }

    /* 首页首屏区域：左侧介绍网站，右侧显示统计信息 */
    .hero {
      padding: 72px 0 36px;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 26px;
      align-items: stretch;
    }

    .hero-card, .side-card, .article, .post-card, .editor-card {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: clamp(26px, 5vw, 54px);
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "</>";
      position: absolute;
      right: 28px;
      bottom: -18px;
      font-size: 7rem;
      font-weight: 900;
      color: color-mix(in srgb, var(--brand) 12%, transparent);
      pointer-events: none;
    }

    .eyebrow {
      color: var(--brand-2);
      font-weight: 800;
      margin: 0 0 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 4.8rem);
      line-height: 1.02;
      letter-spacing: -0.065em;
    }

    .hero p {
      max-width: 720px;
      color: var(--muted);
      margin: 20px 0 0;
      font-size: 1.05rem;
    }

    .side-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-2);
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* 搜索工具栏：包含搜索框和清空本地编辑按钮 */
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      margin: 20px 0 26px;
      align-items: center;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 16px;
      box-shadow: var(--shadow);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 14px 0;
    }

    /* 标签筛选区：根据文章 tags 生成筛选按钮 */
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 4px 0 24px;
    }

    .tag {
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      padding: 7px 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.92rem;
    }

    .tag.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    /* 卡片网格：文章卡片和下载资源卡片都用这个布局 */
    .posts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      padding-bottom: 64px;
    }

    .post-card {
      padding: 22px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .post-card:hover {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--brand) 55%, var(--border));
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .post-card h2 {
      margin: 12px 0 8px;
      font-size: 1.35rem;
      line-height: 1.25;
      letter-spacing: -0.025em;
    }

    .post-card p {
      color: var(--muted);
      margin: 0;
    }

    .post-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .mini-tag {
      color: var(--brand-2);
      background: color-mix(in srgb, var(--brand) 10%, transparent);
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.82rem;
    }

    /* 文章详情页容器：点击文章卡片后进入这个页面 */
    .article {
      padding: clamp(22px, 4vw, 52px);
      margin: 36px auto 64px;
      max-width: 900px;
    }

    .article h1 {
      font-size: clamp(2rem, 5vw, 3.7rem);
      margin-bottom: 12px;
    }

    /* Markdown 正文区域：控制文章内容的排版 */
    .article-body {
      margin-top: 34px;
      font-size: 1.04rem;
    }

    .article-body h2, .article-body h3 {
      letter-spacing: -0.02em;
      margin-top: 34px;
      line-height: 1.25;
    }

    .article-body p { margin: 16px 0; }
    .article-body ul, .article-body ol { padding-left: 1.5em; }
    .article-body blockquote {
      margin: 18px 0;
      padding: 10px 18px;
      border-left: 4px solid var(--brand);
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 14px;
    }

    .article-body code {
      background: color-mix(in srgb, var(--brand) 12%, transparent);
      padding: 2px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .article-body pre {
      overflow: auto;
      background: var(--code-bg);
      color: var(--code-text);
      padding: 18px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--border) 45%, transparent);
    }

    .article-body pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .article-body table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
    }

    .article-body th, .article-body td {
      border: 1px solid var(--border);
      padding: 10px 12px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 38px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }

    /* 写文章弹窗：点击“写文章”后显示 */
    dialog {
      border: 0;
      padding: 0;
      width: min(980px, calc(100% - 28px));
      border-radius: 26px;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
    }

    dialog::backdrop {
      background: rgba(2, 6, 23, 0.62);
      backdrop-filter: blur(5px);
    }

    .editor-card {
      box-shadow: none;
      border: 0;
      padding: 24px;
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    /* 编辑器布局：左边写 Markdown，右边实时预览 */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field { display: grid; gap: 7px; }
    .field label { color: var(--muted); font-size: 0.92rem; }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      padding: 12px 14px;
    }

    .field textarea {
      min-height: 320px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.55;
    }

    .editor-preview {
      max-height: 520px;
      overflow: auto;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 16px;
      padding: 14px;
    }

    .editor-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .hidden { display: none !important; }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      color: var(--muted);
    }

    /* 平板适配：屏幕变窄后改成单列布局 */
    @media (max-width: 920px) {
      .hero, .toolbar, .editor-grid { grid-template-columns: 1fr; }
      .posts { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* 手机适配：导航和卡片全部变成纵向排列 */
    @media (max-width: 640px) {
      .nav-inner { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      .nav-actions { justify-content: flex-start; }
      .posts { grid-template-columns: 1fr; }
      .hero { padding-top: 34px; }
      .hero-card::after { display: none; }
      button, .button { padding: 9px 12px; }
    }
  </style>
</head>
<body>
  <!-- body 区域：浏览器真正显示出来的页面内容 -->
  <!-- 顶部导航栏：包含 Logo、主题切换、导入导出、写文章按钮 -->
  <nav class="nav">
    <div class="container nav-inner">
      <a class="logo" href="#home" aria-label="回到首页">
        <span class="logo-mark">D</span>
        <span>DCloudCode 技术博客</span>
      </a>
      <div class="nav-actions">
        <button id="themeBtn" title="切换明暗主题">🌗 主题</button>
        <button id="importBtn">导入 posts.json</button>
        <button id="exportBtn">导出 posts.json</button>
        <button id="newPostBtn" class="primary">✍️ 写文章</button>
      </div>
    </div>
  </nav>

  <!-- 主内容区域：JavaScript 会把首页、文章详情页动态渲染到这里 -->
  <main id="app" class="container"></main>

  <!-- 页脚区域：放网站说明文字 -->
  <footer>
    <div class="container">
      <strong>DCloudCode</strong> · 一个不需要后端的技术博客模板。文章保存在浏览器本地；导出 posts.json 后放到 data/ 文件夹即可公开发布。
    </div>
  </footer>

  <!-- 隐藏的文件选择框：点击“导入 posts.json”时会触发它 -->
  <input id="fileInput" type="file" accept="application/json,.json" class="hidden" />

  <!-- 写文章弹窗：用于本地写 Markdown、实时预览和导出文章 -->
  <dialog id="editorDialog">
    <form method="dialog" class="editor-card" id="editorForm">
      <div class="editor-head">
        <div>
          <div class="eyebrow">Markdown Editor</div>
          <h2 style="margin: 0; letter-spacing: -0.03em;">写一篇技术博客</h2>
        </div>
        <button type="button" id="closeEditorBtn">关闭</button>
      </div>

      <input type="hidden" id="postId" />
      <div class="editor-grid">
        <div class="field">
          <label for="titleInput">标题</label>
          <input id="titleInput" required placeholder="例如：ROS2 参数通信为什么依赖服务通信？" />
        </div>
        <div class="field">
          <label for="tagsInput">标签，用英文逗号分隔</label>
          <input id="tagsInput" placeholder="ROS2, Python, 深度学习" />
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label for="summaryInput">摘要</label>
          <input id="summaryInput" placeholder="用一句话说明这篇文章解决什么问题" />
        </div>
        <div class="field">
          <label for="contentInput">正文 Markdown</label>
          <textarea id="contentInput" required spellcheck="false" placeholder="# 标题\n\n## 问题背景\n\n```c\nprintf(\"Hello\");\n```"></textarea>
        </div>
        <div class="field">
          <label>实时预览</label>
          <div class="editor-preview article-body" id="previewBox"></div>
        </div>
      </div>

      <div class="editor-actions">
        <button type="button" class="danger" id="deletePostBtn">删除文章</button>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
          <button type="button" id="downloadMdBtn">下载 .md</button>
          <button type="submit" class="primary">保存到本地</button>
        </div>
      </div>
    </form>
  </dialog>

  <script>
    // 脚本区：负责读取文章数据、渲染页面、搜索筛选、编辑文章和下载资源
    // 浏览器本地文章缓存 key：保存你在网页里临时写的文章
    const STORAGE_KEY = "dcloudcode_posts_v1";
    // 浏览器本地主题缓存 key：保存明暗主题设置
    const THEME_KEY = "dcloudcode_theme_v1";
    // 文章目录文件路径：网站会从这里读取文章列表
    const POSTS_JSON_PATH = "data/posts.json"; // 你可以改成 "content/posts.json"、"articles/posts.json" 等路径
    // 下载资源目录文件路径：网站会从这里读取下载列表
    const DOWNLOADS_JSON_PATH = "data/downloads.json"; // 可选：下载资源列表，例如 PDF、ZIP、代码包、课件

    // 内置文章区：这里已经清空，不再让 index.html 自带示例文章。
    // 正式文章请写在 articles/*.md 中，再到 data/posts.json 里登记。
    const seedPosts = [];

    // 文章数据数组：data/posts.json 读取后会放到这里
    let posts = [];
    // 下载资源数组：data/downloads.json 读取后会放到这里
    let downloads = [];
    // 当前选中的标签，默认显示全部文章
    let activeTag = "全部";
    // 当前搜索关键词
    let searchTerm = "";

    const app = document.querySelector("#app");
    const editorDialog = document.querySelector("#editorDialog");
    const postId = document.querySelector("#postId");
    const titleInput = document.querySelector("#titleInput");
    const summaryInput = document.querySelector("#summaryInput");
    const tagsInput = document.querySelector("#tagsInput");
    const contentInput = document.querySelector("#contentInput");
    const previewBox = document.querySelector("#previewBox");
    const fileInput = document.querySelector("#fileInput");

    // 页面启动入口：网页加载后先执行初始化
    init();

    // 初始化函数：加载主题、文章、下载资源，绑定按钮事件，然后渲染页面
    async function init() {
      document.documentElement.dataset.theme = localStorage.getItem(THEME_KEY) || "light";
      posts = await loadInitialPosts();
      downloads = await loadInitialDownloads();
      bindEvents();
      render();
      window.addEventListener("hashchange", render);
    }

    // 加载文章：优先读取浏览器本地缓存，没有缓存再读取 data/posts.json
    async function loadInitialPosts() {
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) return safeParsePosts(local, seedPosts);

      try {
        const response = await fetch(POSTS_JSON_PATH, { cache: "no-store" });
        if (response.ok) {
          const remotePosts = await response.json();
          if (Array.isArray(remotePosts)) return await hydrateMarkdownFiles(normalizePosts(remotePosts));
        }
      } catch (error) {
        // 本地直接打开 index.html 时，fetch posts.json 可能失败，使用内置示例文章即可。
      }
      return seedPosts;
    }

    // 绑定事件：给按钮、文件导入、编辑器输入框添加交互功能
    function bindEvents() {
      document.querySelector("#themeBtn").addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem(THEME_KEY, next);
      });

      document.querySelector("#newPostBtn").addEventListener("click", () => openEditor());
      document.querySelector("#closeEditorBtn").addEventListener("click", () => editorDialog.close());
      document.querySelector("#exportBtn").addEventListener("click", exportPostsJson);
      document.querySelector("#importBtn").addEventListener("click", () => fileInput.click());
      document.querySelector("#deletePostBtn").addEventListener("click", deleteCurrentPost);
      document.querySelector("#downloadMdBtn").addEventListener("click", downloadCurrentMarkdown);

      fileInput.addEventListener("change", importPostsJson);

      document.querySelector("#editorForm").addEventListener("submit", event => {
        event.preventDefault();
        savePostFromEditor();
      });

      contentInput.addEventListener("input", updatePreview);
      titleInput.addEventListener("input", updatePreview);
    }

    // 路由渲染：根据地址栏 hash 决定显示首页还是文章详情
    function render() {
      const currentId = location.hash.startsWith("#post-") ? location.hash.replace("#post-", "") : "";
      if (currentId) {
        const post = posts.find(item => item.id === currentId);
        if (post) return renderArticle(post);
      }
      renderHome();
    }

    // 渲染首页：生成首页介绍、搜索框、标签、文章卡片和下载卡片
    function renderHome() {
      const tags = ["全部", ...new Set(posts.flatMap(post => post.tags || []))];
      const filteredDownloads = downloads.filter(item => {
        const haystack = [item.title, item.description, item.category, item.file].join(" ").toLowerCase();
        return haystack.includes(searchTerm.toLowerCase().trim());
      });
      const filtered = posts
        .filter(post => activeTag === "全部" || post.tags.includes(activeTag))
        .filter(post => {
          const haystack = [post.title, post.summary, post.tags.join(" "), post.content].join(" ").toLowerCase();
          return haystack.includes(searchTerm.toLowerCase().trim());
        })
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      app.innerHTML = `
        <section class="hero">
          <div class="hero-card">
            <p class="eyebrow">Static · Markdown · Low Cost</p>
            <h1>DCloudCode 技术博客</h1>
            <p>这里是 DCloudCode 技术博客，用来记录 ROS2、机器人、深度学习、嵌入式开发和项目技术文档。</p>
          </div>
          <aside class="side-card">
            <div>
              <p class="eyebrow">当前站点</p>
              <div class="stat-grid">
                <div class="stat"><strong>${posts.length}</strong><span>文章</span></div>
                <div class="stat"><strong>${tags.length - 1}</strong><span>标签</span></div>
                <div class="stat"><strong>0</strong><span>服务器成本</span></div>
                <div class="stat"><strong>1</strong><span>HTML 文件</span></div>
              </div>
            </div>
            <button class="primary" onclick="openEditor()">开始写第一篇文章</button>
          </aside>
        </section>

        <section class="toolbar">
          <div class="search-box">
            <span>🔎</span>
            <input id="searchInput" placeholder="搜索标题、标签或正文，例如 CNN、ROS2、STM32" value="${escapeAttr(searchTerm)}" />
          </div>
          <button onclick="clearLocalData()">清空本地编辑</button>
        </section>

        <section class="tags">
          ${tags.map(tag => `<span class="tag ${tag === activeTag ? "active" : ""}" data-tag="${escapeAttr(tag)}">${escapeHtml(tag)}</span>`).join("")}
        </section>

        <section class="posts">
          ${filtered.length ? filtered.map(renderPostCard).join("") : `<div class="empty">没有找到文章。换个关键词试试，或者点击右上角写一篇。</div>`}
        </section>

        <section style="padding-bottom:64px;">
          <div style="display:flex; justify-content:space-between; align-items:end; gap:12px; flex-wrap:wrap; margin-bottom:18px;">
            <div>
              <p class="eyebrow">Downloads</p>
              <h2 style="margin:0; letter-spacing:-0.03em;">资料下载</h2>
            </div>
          </div>
          <div class="posts">
            ${filteredDownloads.length ? filteredDownloads.map(renderDownloadCard).join("") : `<div class="empty">暂无下载资源。你可以创建 data/downloads.json，并把 PDF、ZIP、代码包放进 downloads/ 文件夹。</div>`}
          </div>
        </section>
      `;

      document.querySelector("#searchInput").addEventListener("input", event => {
        searchTerm = event.target.value;
        renderHome();
      });

      document.querySelectorAll(".tag").forEach(tag => {
        tag.addEventListener("click", () => {
          activeTag = tag.dataset.tag;
          renderHome();
        });
      });
    }

    // 渲染文章卡片：把一篇文章变成首页里的卡片 HTML
    function renderPostCard(post) {
      return `
        <a class="post-card" href="#post-${escapeAttr(post.id)}">
          <div>
            <div class="meta"><span>${formatDate(post.date)}</span><span>·</span><span>${estimateReadTime(post.content)} 分钟阅读</span></div>
            <h2>${escapeHtml(post.title)}</h2>
            <p>${escapeHtml(post.summary || "这篇文章还没有摘要。")}</p>
          </div>
          <div class="post-tags">
            ${(post.tags || []).map(tag => `<span class="mini-tag"># ${escapeHtml(tag)}</span>`).join("")}
          </div>
        </a>
      `;
    }

    // 渲染下载卡片：把一个下载资源变成首页里的下载卡片 HTML
    function renderDownloadCard(item) {
      return `
        <article class="post-card">
          <div>
            <div class="meta"><span>${escapeHtml(item.category || "资源")}</span><span>·</span><span>${escapeHtml(item.size || "未知大小")}</span></div>
            <h2>${escapeHtml(item.title)}</h2>
            <p>${escapeHtml(item.description || "")}</p>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;">
            <a class="button primary" href="${escapeAttr(item.file)}" download>下载</a>
            <a class="button" href="${escapeAttr(item.file)}" target="_blank" rel="noreferrer">预览/打开</a>
          </div>
        </article>
      `;
    }

    // 渲染文章详情页：点击文章后显示完整 Markdown 正文
    function renderArticle(post) {
      app.innerHTML = `
        <article class="article">
          <button onclick="location.hash='home'">← 返回首页</button>
          <div style="height:22px"></div>
          <div class="meta"><span>${formatDate(post.date)}</span><span>·</span><span>${estimateReadTime(post.content)} 分钟阅读</span></div>
          <h1>${escapeHtml(post.title)}</h1>
          <p style="color:var(--muted); font-size:1.08rem;">${escapeHtml(post.summary || "")}</p>
          <div class="post-tags">
            ${(post.tags || []).map(tag => `<span class="mini-tag"># ${escapeHtml(tag)}</span>`).join("")}
          </div>
          <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="openEditor('${escapeAttr(post.id)}')">编辑本文</button>
            <button onclick="copyArticleLink('${escapeAttr(post.id)}')">复制链接</button>
          </div>
          <div class="article-body">${renderMarkdown(post.content)}</div>
        </article>
      `;
    }

    // 打开编辑器：id 为空表示新建文章，有 id 表示编辑已有文章
    function openEditor(id = "") {
      const post = posts.find(item => item.id === id);
      postId.value = post ? post.id : "";
      titleInput.value = post ? post.title : "";
      summaryInput.value = post ? post.summary : "";
      tagsInput.value = post ? post.tags.join(", ") : "";
      contentInput.value = post ? post.content : `# 新文章标题\n\n## 问题背景\n\n这里写你遇到的问题。\n\n## 核心原理\n\n这里解释原理。\n\n## 代码实现\n\n\`\`\`python\nprint("Hello, DCloudCode")\n\`\`\`\n\n## 总结\n\n用几句话总结。`;
      updatePreview();
      editorDialog.showModal();
    }

    // 更新实时预览：把左侧 Markdown 转换成右侧预览 HTML
    function updatePreview() {
      const title = titleInput.value.trim() || "文章预览";
      previewBox.innerHTML = `<h1>${escapeHtml(title)}</h1>${renderMarkdown(contentInput.value)}`;
    }

    // 保存文章：把编辑器里的内容保存到浏览器本地缓存
    function savePostFromEditor() {
      const now = new Date();
      const id = postId.value || slugify(titleInput.value) || `post-${Date.now()}`;
      const nextPost = {
        id,
        title: titleInput.value.trim(),
        summary: summaryInput.value.trim(),
        tags: tagsInput.value.split(",").map(tag => tag.trim()).filter(Boolean),
        date: now.toISOString().slice(0, 10),
        content: contentInput.value.trim()
      };

      const index = posts.findIndex(post => post.id === id);
      if (index >= 0) posts[index] = nextPost;
      else posts.unshift(nextPost);

      persistPosts();
      editorDialog.close();
      location.hash = `post-${id}`;
      render();
      alert("已保存到当前浏览器。要让其他人也看到，请点击“导出 posts.json”，然后上传到仓库的 data/ 文件夹。" );
    }

    // 删除文章：删除当前正在编辑的本地文章
    function deleteCurrentPost() {
      if (!postId.value) {
        editorDialog.close();
        return;
      }
      if (!confirm("确定删除这篇文章吗？")) return;
      posts = posts.filter(post => post.id !== postId.value);
      persistPosts();
      editorDialog.close();
      location.hash = "home";
      render();
    }

    // 下载 Markdown：把当前编辑器正文保存成 .md 文件
    function downloadCurrentMarkdown() {
      const filename = `${slugify(titleInput.value) || "article"}.md`;
      downloadFile(filename, contentInput.value, "text/markdown;charset=utf-8");
    }

    // 导出 posts.json：把当前本地文章列表导出成 JSON 文件
    function exportPostsJson() {
      const json = JSON.stringify(posts, null, 2);
      downloadFile("posts.json", json, "application/json;charset=utf-8");
    }

    // 导入 posts.json：从本地选择 JSON 文件并导入到浏览器缓存
    async function importPostsJson(event) {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        posts = safeParsePosts(text, posts);
        persistPosts();
        location.hash = "home";
        render();
        alert("导入成功，已保存到当前浏览器。");
      } catch (error) {
        alert("导入失败，请确认文件是正确的 posts.json。" );
      } finally {
        fileInput.value = "";
      }
    }

    // 清空本地编辑：删除浏览器缓存，让网站重新读取线上 data/posts.json
    function clearLocalData() {
      if (!confirm("这会清空当前浏览器保存的文章，并恢复线上 data/posts.json 或示例文章。继续吗？")) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    // 持久化文章：把文章数组写入 localStorage
    function persistPosts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    // 复制文章链接：复制当前文章的访问地址
    function copyArticleLink(id) {
      const url = `${location.origin}${location.pathname}#post-${id}`;
      navigator.clipboard.writeText(url).then(() => alert("链接已复制"));
    }

    // 通用下载函数：用于下载 posts.json 或 Markdown 文件
    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // 加载下载资源：读取 data/downloads.json，没有就显示空资源提示
    async function loadInitialDownloads() {
      try {
        const response = await fetch(DOWNLOADS_JSON_PATH, { cache: "no-store" });
        if (!response.ok) return [];
        const data = await response.json();
        if (!Array.isArray(data)) return [];
        return data.map((item, index) => ({
          id: String(item.id || `download-${index}`),
          title: String(item.title || "未命名资源"),
          description: String(item.description || ""),
          category: String(item.category || "资源"),
          size: String(item.size || ""),
          file: String(item.file || "")
        })).filter(item => item.file);
      } catch (error) {
        return [];
      }
    }

    // 安全解析 JSON：解析失败就返回备用数据，避免页面崩溃
    function safeParsePosts(text, fallback) {
      try {
        const data = JSON.parse(text);
        if (!Array.isArray(data)) return fallback;
        return normalizePosts(data);
      } catch (error) {
        return fallback;
      }
    }

    // 规范化文章数据：补齐 id、title、tags、date、file、content 等字段
    function normalizePosts(data) {
      return data.map((post, index) => ({
        id: String(post.id || slugify(post.title || `post-${index}`) || `post-${index}`),
        title: String(post.title || "未命名文章"),
        summary: String(post.summary || ""),
        tags: Array.isArray(post.tags) ? post.tags.map(String) : [],
        date: String(post.date || new Date().toISOString().slice(0, 10)),
        file: String(post.file || ""), // 可选：把正文放到单独的 .md 文件里，例如 "articles/ros2.md"
        content: String(post.content || "")
      }));
    }

    // 读取 Markdown 文件：根据 file 字段加载 articles/*.md 正文
    async function hydrateMarkdownFiles(postList) {
      return await Promise.all(postList.map(async post => {
        if (!post.file) return post;
        try {
          const response = await fetch(post.file, { cache: "no-store" });
          if (!response.ok) return post;
          return { ...post, content: await response.text() };
        } catch (error) {
          return post;
        }
      }));
    }

    // Markdown 渲染器：把 Markdown 文本转换成网页可以显示的 HTML
    function renderMarkdown(markdown) {
      const codeBlocks = [];
      let text = markdown.replace(/```([\s\S]*?)```/g, (_, code) => {
        const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
        codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
        return token;
      });

      text = escapeHtml(text);
      text = text
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
        .replace(/^> (.*)$/gm, "<blockquote>$1</blockquote>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

      const lines = text.split("\n");
      const html = [];
      let inList = false;

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (inList) { html.push("</ul>"); inList = false; }
          continue;
        }
        if (line.startsWith("@@CODE_BLOCK_")) {
          if (inList) { html.push("</ul>"); inList = false; }
          html.push(line);
          continue;
        }
        if (/^- /.test(line)) {
          if (!inList) { html.push("<ul>"); inList = true; }
          html.push(`<li>${line.replace(/^- /, "")}</li>`);
          continue;
        }
        if (inList) { html.push("</ul>"); inList = false; }
        if (/^<h\d|^<blockquote/.test(line)) html.push(line);
        else html.push(`<p>${line}</p>`);
      }
      if (inList) html.push("</ul>");

      return html.join("\n").replace(/@@CODE_BLOCK_(\d+)@@/g, (_, index) => codeBlocks[Number(index)]);
    }

    // 阅读时间估算：根据文章长度估算大概阅读分钟数
    function estimateReadTime(content) {
      return Math.max(1, Math.ceil((content || "").length / 550));
    }

    // 日期格式化：把 2026-04-28 转成中文日期显示
    function formatDate(date) {
      return new Intl.DateTimeFormat("zh-CN", { year: "numeric", month: "long", day: "numeric" }).format(new Date(date));
    }

    // 标题转 id：把文章标题转换成适合 URL 使用的字符串
    function slugify(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[\u4e00-\u9fa5]/g, char => char.charCodeAt(0).toString(36))
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 80);
    }

    // HTML 转义：防止文章内容中的特殊字符破坏页面结构
    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 属性转义：用于 href、data-tag 等 HTML 属性值
    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    window.openEditor = openEditor;
    window.clearLocalData = clearLocalData;
    window.copyArticleLink = copyArticleLink;
  </script>
</body>
</html>
